<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Paillier Bank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f3ff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #4c1d95; margin-bottom: 5px; }
        .welcome { color: #6b7280; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { 
            padding: 20px; 
            text-align: center; 
            border: 1px solid #e5e7eb; 
            border-radius: 12px; 
            transition: 0.3s; 
            cursor: pointer; 
            text-decoration: none; 
            color: #4b5563; 
        }
        .card:hover { 
            border-color: #7c3aed; 
            background-color: #fdf4ff;
            color: #7c3aed;
            transform: translateY(-2px); 
        }
        
        .btn-regist { background-color: #f3e8ff; color: #6b21a8; border: 1px solid #d8b4fe; }
        .btn-action { background-color: #fff; }

        .logout-link { display: block; text-align: center; margin-top: 30px; color: #dc3545; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Admin Portal</h2>
            <p class="welcome">Panel Kontrol: <strong>{{ user.username }}</strong></p>
        </div>

        <a href="{% url 'admin-register-nasabah' %}" class="card btn-regist" style="display: block; margin-bottom: 20px;">
            <h3 style="margin:0;">+ Daftarkan Nasabah</h3>
            <p style="margin:5px 0 0 0; font-size:0.9rem;">Generate Keypair & Akun Baru</p>
        </a>

        <div class="action-grid">
            <a href="{% url 'admin-setor-tunai' %}" class="card btn-action">
                <h3 style="font-size:1.5rem;">📥</h3>
                <h3>Setor Tunai</h3>
                <p>Tambah Saldo</p>
            </a>

            <a href="{% url 'admin-tarik-tunai' %}" class="card btn-action">
                <h3 style="font-size:1.5rem;">📤</h3>
                <h3>Tarik Tunai</h3>
                <p>Kurangi Saldo</p>
            </a>
        </div>

        <a href="{% url 'logout' %}" class="logout-link">Keluar (Logout)</a>
    </div>

</body>
</html>
