<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tarik Tunai</title>
    <style>
        /* Mengikuti desain Dashboard Admin */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f5f3ff; 
            padding: 40px 20px; 
            margin: 0;
        }
        
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.1); 
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #4c1d95; margin-bottom: 5px; font-weight: 700; }
        .header p { color: #6b7280; font-size: 0.95rem; }

        /* Form Styles */
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #4b5563; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #f9fafb;
        }

        input:focus { 
            border-color: #7c3aed; 
            background-color: #fff;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }
        
        /* Pembatas / Separator */
        .separator { 
            text-align: center; 
            margin: 25px 0; 
            color: #9ca3af; 
            font-size: 0.75rem; 
            font-weight: bold;
            position: relative; 
        }
        .separator::before, .separator::after {
            content: ""; position: absolute; top: 50%; width: 35%; height: 1px; background: #e5e7eb;
        }
        .separator::before { left: 0; }
        .separator::after { right: 0; }

        .helper-text { 
            font-size: 0.75rem; 
            color: #7c3aed; 
            margin-top: 6px; 
            font-style: italic;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #7c3aed; /* Ungu Admin */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.2);
        }
        .btn-submit:hover { 
            background-color: #6d28d9; 
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #4c1d95; text-decoration: underline; }

        /* Alerts */
        .messages { list-style: none; padding: 0; margin-bottom: 25px; }
        .alert { 
            padding: 12px 16px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            font-size: 0.9rem; 
            display: flex;
            align-items: center;
        }
        .alert-success { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        
        hr { border: 0; border-top: 1px solid #f3e8ff; margin: 30px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Tarik Tunai</h2>
            <p>Tarik saldo dari rekening nasabah</p>
        </div>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                        {% if message.tags == 'error' %}⚠️{% else %}✅{% endif %} {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="POST" action="{% url 'admin-tarik-tunai' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username Nasabah</label>
                <input type="text" name="username" id="username" placeholder="Contoh: budi_santoso">
            </div>

            <div class="separator">ATAU EMAIL</div>

            <div class="form-group">
                <label for="email">Email Nasabah</label>
                <input type="email" name="email" id="email" placeholder="Contoh: budi@email.com">
            </div>

            <hr>

            <div class="form-group">
                <label for="nominal_tarik">Nominal Tarik</label>
                <input type="number" name="nominal_tarik" id="nominal_tarik" required min="1" placeholder="Contoh: 100000">
            </div>
            
            <div class="form-group">
                <label for="deskripsi">Keterangan Transaksi</label>
                <input type="text" name="deskripsi" id="deskripsi" placeholder="Contoh: Kebutuhan Primer">
            </div>

            <button type="submit" class="btn-submit">SUBMIT</button>
        </form>

        <a href="{% url 'admin-bank-dashboard' %}" class="back-link">&larr; Kembali ke Dashboard</a>
    </div>

</body>
</html>
