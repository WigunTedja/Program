{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="mb-4">
                <a href="{% url 'bank-dashboard' %}" class="btn btn-outline-secondary btn-sm">
                    &larr; Kembali ke Dashboard
                </a>
            </div>

            <div class="card shadow border-0 mx-auto">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="bi bi-send text-primary" style="font-size: 3rem;">💸</i>
                        </div>
                        <h2 class="fw-bold">Transfer Dana</h2>
                        <p class="text-muted small">Kirim saldo ke sesama nasabah secara aman dengan enkripsi homomorfik.</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" action="">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold small text-uppercase text-muted">Username Tujuan</label>
                            <input type="text" class="form-control bg-light" id="username" name="username" placeholder="Contoh: budi_santoso">
                        </div>

                        <div class="text-center text-muted my-3 small fw-bold position-relative">
                            <span class="bg-white px-2 text-secondary" style="position: relative; z-index: 1;">ATAU EMAIL</span>
                            <hr class="position-absolute top-50 start-0 w-100 m-0" style="z-index: 0;">
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold small text-uppercase text-muted">Email Tujuan</label>
                            <input type="email" class="form-control bg-light" id="email" name="email" placeholder="Contoh: budi@email.com">
                        </div>

                        <hr class="text-muted border-2 opacity-10 my-4">

                        <div class="mb-3">
                            <label for="nominal_transfer" class="form-label fw-bold small text-uppercase text-muted">Nominal Transfer (Rp)</label>
                            <input type="number" class="form-control form-control-lg text-primary fw-bold" id="nominal_transfer" name="nominal_transfer" required min="1" placeholder="Contoh: 100000">
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                Kirim Dana Sekarang
                            </button>
                            <a href="{% url 'bank-dashboard' %}" class="btn btn-link text-decoration-none text-muted mt-2">Batal</a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
