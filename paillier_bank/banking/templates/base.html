<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Bank Paillier Aman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* OVERRIDE BOOTSTRAP UNTUK TEMA UNGU */
        :root {
            --bs-primary: #7c3aed; /* Violet 600 */
            --bs-primary-rgb: 124, 58, 237;
            --bs-link-color: #7c3aed;
        }
        
        /* Mengganti bg-primary (Navbar) */
        .bg-primary {
            background-color: #7c3aed !important;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%) !important;
        }

        /* Mengganti tombol primary */
        .btn-primary {
            background-color: #7c3aed !important;
            border-color: #7c3aed !important;
        }
        .btn-primary:hover {
            background-color: #6d28d9 !important;
            border-color: #6d28d9 !important;
        }

        /* Mengganti outline primary */
        .btn-outline-primary {
            color: #7c3aed !important;
            border-color: #7c3aed !important;
        }
        .btn-outline-primary:hover {
            background-color: #7c3aed !important;
            color: #fff !important;
        }
        
        body {
            background-color: #f5f3ff; /* Latar belakang ungu muda untuk seluruh aplikasi */
        }
        
        .card {
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Paillier Bank</a>
            <div>
                {% if user.is_authenticated %}
                    <span class="text-white me-3">Halo, {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-light text-primary fw-bold">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center py-4 text-muted border-top mt-5">
        &copy; 2025 Proyek Kriptografi Paillier
    </footer>

</body>
</html>
